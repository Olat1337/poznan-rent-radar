version: '3.8'

services:
  backend-api:
    build:
      context: ..
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    restart: always

  frontend-ui:
    build:
      context: ..
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend-api:8000
    depends_on:
      - backend-api
    restart: always